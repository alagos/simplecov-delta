name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Run specs with coverage
        run: bundle exec rspec --format documentation

      - name: Upload coverage result
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: coverage-rspec
          path: coverage/.resultset.json
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 1

  coverage-report:
    name: '📊 Coverage Report'
    runs-on: ubuntu-latest
    if: success() || failure()
    needs: [test]

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Download coverage results
        uses: actions/download-artifact@v4
        with:
          pattern: "coverage-*"
          path: coverage-results/

      - name: Restore coverage baseline
        uses: actions/cache/restore@v4
        with:
          path: coverage-baseline/.resultset.json
          key: ${{ format('coverage-baseline-{0}-', github.event_name == 'pull_request' && github.event.pull_request.base.ref || github.ref_name) }}
          restore-keys: |
            coverage-baseline-${{ github.event.repository.default_branch }}-

      - name: Check restored baseline file
        run: |
          if [ -f coverage-baseline/.resultset.json ]; then
            echo "Baseline found at coverage-baseline/.resultset.json"
            ls -lh coverage-baseline/.resultset.json
          else
            echo "Baseline not found at coverage-baseline/.resultset.json"
          fi

      - name: Generate coverage report using simplecov-delta
        uses: ./
        with:
          resultset-paths: |
            coverage-results/*/.resultset.json
          baseline-path: coverage-baseline/.resultset.json
          min-coverage: 80

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-report
          path: coverage/
          retention-days: 30

      - name: Save coverage baseline
        if: github.event_name == 'push'
        run: |
          mkdir -p coverage-baseline
          cp coverage/.resultset.json coverage-baseline/.resultset.json

      - name: Cache coverage baseline
        if: github.event_name == 'push'
        uses: actions/cache/save@v4
        with:
          path: coverage-baseline/.resultset.json
          key: coverage-baseline-${{ github.ref_name }}-${{ github.sha }}

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate action.yml
        run: |
          python3 -c "
          import yaml, sys
          with open('action.yml') as f:
              data = yaml.safe_load(f)
          assert 'inputs' in data, 'Missing inputs'
          assert 'outputs' in data, 'Missing outputs'
          assert 'runs' in data, 'Missing runs'
          print('action.yml is valid')
          "

      - name: Validate Dockerfile
        run: docker build --no-cache -t simplecov-delta-test .

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t simplecov-delta .
